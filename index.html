<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>詰将棋 棋譜読み上げ</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* =========================
   全体
========================= */

body{
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* タイトル */
h2{
  margin:12px 0;
}

/* =========================
   レイアウト
========================= */

.container{
  width:100%;
  max-width:500px;
  padding:10px;
  box-sizing:border-box;
}

/* =========================
   ボタン（ちょいオシャレ）
========================= */

.buttonArea{
  display:flex;
  gap:10px;
  margin-bottom:12px;
}

button{
  flex:1;
  font-size:16px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#8b5a2b,#a9743a);
  color:white;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  cursor:pointer;
  transition:0.2s;
}

button:active{
  transform:translateY(2px);
  box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

/* =========================
   入力系
========================= */

.controlArea{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:10px;
}

label{
  font-size:14px;
}

input, select{
  width:100%;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

/* =========================
   盤面
========================= */

#board{
  display:grid;
  grid-template-columns:repeat(9,1fr);
  grid-template-rows:repeat(9,1fr);

  width:100%;
  aspect-ratio:1;

  background:#f4c66b;
  border:4px solid #8b5a2b;
  box-shadow:0 6px 16px rgba(0,0,0,0.3);
  margin-top:10px;
}

.square{
  border:1px solid #6b4b16;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* 駒 */
.square.hasPiece::before{
  content:attr(data-piece);
  display:flex;
  align-items:center;
  justify-content:center;
  width:80%;
  height:80%;
  background:#f7e3b0;
  border:2px solid #333;
  font-weight:bold;
  font-size:clamp(14px,5vw,26px);

  clip-path:polygon(
    50% 0%,
    100% 38%,
    80% 100%,
    20% 100%,
    0% 38%
  );
}

/* 玉方 */
.square.gote::before{
  transform:rotate(180deg);
  background:#e3c98b;
}

/* 成駒 */
.square.promoted::before{
  color:#c40000;
}

/* =========================
   棋譜
========================= */

#moves{
  margin-top:10px;
  width:100%;
  max-height:160px;
  overflow-y:auto;
  background:white;
  border-radius:8px;
  padding:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  font-size:14px;
}
#gameWrapper {
  display: flex;
  align-items: flex-end; /* ← 下揃えのコア */
  gap: 10px;
}
#handsArea {
  display: flex;
  align-items: flex-end;
}

#senteHandsBox {
  display: grid;
  grid-template-columns: repeat(1, 40px);
  gap: 2px;
}

.handsTitle {
  font-size: 14px;
  margin-bottom: 5px;
}

.handPiece {
  width: 40px;
  height: 40px;
  border: 1px solid #6b4b16;
  background: #f4c66b;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: "Hiragino Mincho ProN", serif;
  font-size: 14px;
}
</style>
</head>

<body>

<h2>詰将棋</h2>

<div class="container">

  <div class="buttonArea">
    <button id="startBtn">開始</button>
    <button onclick="resetGame()">リセット</button>
  </div>

  <div class="controlArea">
    <label>
      待ち時間（秒）
      <input id="autoDelay" type="number" value="10">
    </label>

    <label>
      音声
      <select id="voiceSelect"></select>
    </label>
  </div>

  <div id="gameWrapper">
    <div id="board"></div>
    <div id="handsArea">
      <div id="senteHandsDisplay"></div>
    </div>

  </div>

  <div id="moves"></div>

</div>

<script src="script.js"></script>

</body>
</html>
