<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>詰将棋 棋譜読み上げ</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}
#moves{
  margin-top:20px;
  font-size:18px;
  height:200px;
  overflow:auto;
  border:1px solid #ccc;
  padding:10px;
}
button{
  font-size:16px;
  padding:10px 20px;
  margin-top:10px;
}

#mainArea{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:40px;
  margin-top:20px;
}
#board{
  display:grid;
  grid-template-columns:repeat(9,1fr);
  grid-template-rows:repeat(9,1fr);

  width:min(90vw,520px);
  height:min(90vw,520px);

  background:#f4c66b;           /* 木の色 */
  border:4px solid #8b5a2b;     /* 枠 */
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
}
.square{
  border:1px solid #6b4b16;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}
/* 駒があるマスだけ描画 */
.square.hasPiece::before{

  content:attr(data-piece);

  display:flex;
  align-items:center;
  justify-content:center;

  width:80%;
  height:80%;

  background:#f7e3b0;      /* 攻め方の駒色 */
  border:2px solid #333;

  font-weight:bold;
  font-size:clamp(14px,3.5vw,26px);

  clip-path:polygon(
    50% 0%,
    100% 38%,
    80% 100%,
    20% 100%,
    0% 38%
  );
}
/* 後手駒 */
.square.gote::before{
  transform:rotate(180deg);
  background:#e3c98b;   /* 玉方の駒色（少し濃い） */
}
/* 成駒 */
.square.promoted::before{
  color:#c40000;
}
#moves{
  width:min(90vw,500px);
  max-height:200px;
  overflow-y:auto;
  margin-top:10px;
}
</style>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>詰将棋 棋譜読み上げ</h2>

<input type="file" id="fileInput">

<div>
<button id="startBtn">開始</button>
<button onclick="resetGame()">リセット</button>
</div>
<label>
手順開始待ち時間(秒)
<input id="autoDelay" type="number" value="30" min="0">
</label>
<label>音声：</label>
<select id="voiceSelect"></select>
<div id="mainArea">
  <div id="board"></div>
  <div id="moves"></div>
</div>
<div>
  <button id="nextBtn" style="display:none">次の問題へ</button>
</div>
<script src="script.js"></script>

</body>
</html>
